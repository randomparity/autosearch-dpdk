# Shared deploy settings (tracked in git).
# System-specific overrides: container-gpu.local.toml (gitignored).
# Override hf_cache and devices for your system.
# Secrets use ${VAR} syntax, resolved from environment at runtime.
#
# hf_cache — override in container-gpu.local.toml for your system.
# Default (when absent): $HOME/.cache/huggingface

[deploy]
runtime = "auto"                               # "auto", "docker", or "podman"
model = "Qwen/Qwen3-0.6B"
port = 8000
container_name = "vllm-bench"
gpu_memory_utilization = 0.90
startup_timeout = 300
devices = "all"                                # "all" or comma-separated indices, e.g. "0" or "0,1"

# Extra engine args passed after --model (list of strings)
engine_args = [
    "--max-num-seqs", "256",
    "--enable-chunked-prefill",
]

[deploy.env]
HF_TOKEN = "${HF_TOKEN:-}"
# VLLM_ATTENTION_BACKEND = "FLASH_ATTN"
